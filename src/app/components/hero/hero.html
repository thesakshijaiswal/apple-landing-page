<section class="relative h-screen w-full overflow-hidden bg-black">
  @for (slide of slides; track $index) {
    <div
      class="absolute inset-0 transition-opacity duration-1000 ease-in-out"
      [class.opacity-100]="currentSlide === $index"
      [class.opacity-0]="currentSlide !== $index"
      [style.z-index]="currentSlide === $index ? 10 : 0"
    >
      <div class="absolute inset-0 bg-black/40 z-10"></div>
      <img [src]="slide.image" class="h-full w-full object-cover" [alt]="slide.title" />

      <div class="absolute inset-0 flex items-center z-20">
        <div class="max-w-7xl mx-auto w-full px-4 md:px-8">
          <div class="max-w-xl text-white">
            <h1 class="text-4xl md:text-6xl font-bold leading-tight mb-4 drop-shadow-lg">
              {{ slide.title }}
            </h1>
            <a
              [href]="slide.link"
              class="text-lg font-medium hover:text-blue-400 transition-all flex items-center"
            >
              {{ slide.subtitle }}
            </a>
          </div>
        </div>
      </div>
    </div>
  }

  <div class="absolute bottom-10 left-4 md:left-24 z-30 flex space-x-4">
    <button
      (click)="prev($event)"
      type="button"
      class="p-3 rounded-full border border-white/50 text-white hover:bg-white hover:text-black transition-all"
    >
      <lucide-icon name="arrow-left" class="w-6 h-6"></lucide-icon>
    </button>
    <button
      (click)="next($event)"
      type="button"
      class="p-3 rounded-full border border-white/50 text-white hover:bg-white hover:text-black transition-all"
    >
      <lucide-icon name="arrow-right" class="w-6 h-6"></lucide-icon>
    </button>
  </div>

  <div class="absolute bottom-12 right-10 z-30 flex space-x-2">
    @for (s of slides; track $index) {
      <div
        class="h-1.5 w-10 rounded-full transition-all duration-500 bg-white"
        [class.opacity-100]="currentSlide === $index"
        [class.opacity-30]="currentSlide !== $index"
      ></div>
    }
  </div>
</section>
